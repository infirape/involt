# buf.gen.yaml
version: v1
plugins:
  - name: go
    out: backend/internal/gen
    opt: paths=source_relative
  - name: connect-go
    out: backend/internal/gen
    opt: paths=source_relative
  - name: es
    out: admin-ui/app/gen
    opt:
      - target=ts
      - import_extension=none
  - name: connect-es
    out: admin-ui/app/gen
    opt:
      - target=ts
      - import_extension=none
