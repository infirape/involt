# buf.gen.yaml
version: v1
plugins:
  - name: es
    path: ./node_modules/.bin/protoc-gen-es
    out: app/gen
    opt:
      - target=ts
      - import_extension=none
  - name: connect-es
    path: ./node_modules/.bin/protoc-gen-connect-es
    out: app/gen
    opt:
      - target=ts
      - import_extension=none
