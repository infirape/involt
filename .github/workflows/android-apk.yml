name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build APK
        run: flutter build apk --release --dart-define=APP_ENV=prod
        working-directory: mobile

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: involt-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Release Registro Electrico v1.0.${{ github.run_number }}"
          body: "Nueva versión generada automáticamente desde la rama main.\n\n**Commit:** ${{ github.sha }}\n**Fecha:** ${{ github.event.head_commit.timestamp }}"
          draft: false
          prerelease: false
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
