name: involt
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Persistence & Data Modeling
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # API & Serialization
  protobuf: ^3.1.0
  connectrpc: ^0.1.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  mobile_scanner: ^6.0.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^5.0.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  drift_dev: ^2.16.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/
