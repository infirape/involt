{{range .Customers}}
<tr class="hover:bg-gray-800/50 transition">
    <td class="px-6 py-4 text-sm font-mono text-magenta">{{.Code}}</td>
    <td class="px-6 py-4">
        <div class="text-sm font-medium text-white">{{.Name}}</div>
    </td>
    <td class="px-6 py-4 text-sm text-gray-400">{{.Community}}</td>
    <td class="px-6 py-4 text-sm text-gray-400">{{.Sector}}</td>
    <td class="px-6 py-4 text-sm text-gray-500 font-mono">{{.MeterNumber}}</td>
    <td class="px-6 py-4">
        <div class="text-sm text-white">{{.LastReading}}</div>
        <div class="text-xs text-gray-500">{{if ne .Consumption "-"}}{{.Consumption}} kWh{{end}}</div>
    </td>
    <td class="px-6 py-4">
        <div class="flex gap-2">
            <button class="p-2 hover:bg-gray-700 rounded-lg text-cyan transition" title="Ver recibo"
                hx-get="/admin/customers/receipt/{{.Code}}" hx-target="#modal-container" hx-swap="innerHTML">
                👁️
            </button>
            <button class="p-2 hover:bg-gray-700 rounded-lg text-green transition" title="Editar"
                hx-get="/admin/customers/edit/{{.Code}}" hx-target="#modal-container" hx-swap="innerHTML">
                ✏️
            </button>
        </div>
    </td>
    <td class="px-6 py-4">
        <span class="px-3 py-1 rounded-full text-xs font-medium {{.StatusClass}}">
            {{.Status}}
        </span>
    </td>
</tr>
{{else}}
<tr>
    <td colspan="8" class="px-6 py-12 text-center text-gray-500 italic">
        No se encontraron clientes con los filtros seleccionados
    </td>
</tr>
{{end}}
