<div class="bg-dark-card border border-gray-800 rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full" id="customers-table">
            <thead class="bg-gray-900">
                <tr class="text-gray-500 text-xs uppercase tracking-wider text-left">
                    <th class="px-6 py-4">Código</th>
                    <th class="px-6 py-4">Nombre</th>
                    <th class="px-6 py-4">Comunidad</th>
                    <th class="px-6 py-4">Sector</th>
                    <th class="px-6 py-4">Medidor</th>
                    <th class="px-6 py-4">Última Lectura</th>
                    <th class="px-6 py-4">Acción</th>
                    <th class="px-6 py-4">Estado</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-800" id="customers-table-body">
                {{template "customer_rows.html" .}}
            </tbody>
        </table>
    </div>
    
    <div class="px-6 py-4 border-t border-gray-800 flex justify-between items-center">
        <div class="text-gray-500 text-sm">
            {{if gt .Page.Total 0}}
            Mostrando {{.Page.Start}} - {{.Page.End}} de {{.Page.Total}}
            {{else}}
            Mostrando 0 - 0 de 0
            {{end}}
        </div>
        <div class="flex gap-2">
            <a href="/admin/customers?page={{.Page.Prev}}&size={{.Page.Size}}&search={{urlquery .Filter.Search}}&sector={{urlquery .Filter.SectorID}}"
                class="px-4 py-2 rounded-lg {{if .Page.HasPrev}}bg-gray-800 text-gray-400 hover:text-white{{else}}bg-gray-900 text-gray-600 pointer-events-none{{end}}">
                Anterior
            </a>
            <a href="/admin/customers?page={{.Page.Next}}&size={{.Page.Size}}&search={{urlquery .Filter.Search}}&sector={{urlquery .Filter.SectorID}}"
                class="px-4 py-2 rounded-lg {{if .Page.HasNext}}bg-gray-800 text-gray-400 hover:text-white{{else}}bg-gray-900 text-gray-600 pointer-events-none{{end}}">
                Siguiente
            </a>
        </div>
    </div>
</div>
