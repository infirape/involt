syntax = "proto3";

package involt.v1;

option go_package = "github.com/infira/involt/backend/internal/gen/involt/v1;involtv1";

// Community represents a village or Caserio (e.g., Alto Chetilla, Cadena).
message Community {
  string id = 1;
  string name = 2;
  uint32 customer_count = 3;
}

// Sector represents a specific area within a community (e.g., Sector A, Tambillo Alto).
message Sector {
  string id = 1;
  string community_id = 2;
  string name = 3;
}

// ConnectionType defines the electrical connection setup.
enum ConnectionType {
  CONNECTION_TYPE_UNSPECIFIED = 0;
  CONNECTION_TYPE_MONOFASICA = 1;
  CONNECTION_TYPE_TRIFASICA = 2;
}

// Customer contains the master data for a water/electricity user.
message Customer {
  string id = 1;
  string code = 2; // e.g., ACH001
  string name = 3;
  string community_id = 4;
  string sector_id = 5;
  ConnectionType connection_type = 6;
  double tariff = 7;
  string meter_number = 8;
  double latitude = 9;
  double longitude = 10;
  double initial_reading = 11;
  string address = 12;
  string contract_start = 13;
  double last_reading_value = 14;
}

// Reading represents a captured meter value at a point in time.
message Reading {
  string id = 1;
  string customer_id = 2;
  
  // Consumption data
  double previous_value = 3;
  double current_value = 4;
  double consumption = 5;
  
  // Metadata
  string photo_url = 6;
  string timestamp = 7; // ISO 8601 string
  double latitude = 8;
  double longitude = 9;
  
  // Financial data (captured for receipt generation consistency)
  double cargo_fijo = 10;
  double alumbrado_publico = 11;
  double saldo_redondeo = 12;
  double total_to_pay = 13;
  string period_start = 14; 
  string period_end = 15;
  double mantenimiento = 16;
  double adjustment = 17;
  double subtotal = 18;
  double round_difference = 19;
  double previous_balance = 20;
  double overdue_total = 21;
  string expiration_date = 22;
  string period = 23;
  string observation = 24;
  string customer_name = 25;
  bool is_paid = 26;
}
// AppConfig contains remote configuration for the mobile application.
message AppConfig {
  string map_url_template = 1;
  string map_user_agent = 2;
}

message Settings {
  string municipalidad = 1;
  string empresa = 2;
  string ruc = 3;
  string direccion = 4;
  string telefono = 5;
  string email = 6;
  int32 dias_vencimiento = 7;
  double tarifa_kwh = 8;
  double cargo_fijo = 9;
  double alumbrado = 10;
  double mantenimiento = 11;
  bool igv = 12;
}

enum PeriodStatus {
  PERIOD_STATUS_UNSPECIFIED = 0;
  PERIOD_STATUS_OPEN = 1;
  PERIOD_STATUS_CLOSED = 2;
}

message Period {
  string id = 1; // YYYY-MM
  string start_date = 2;
  string end_date = 3;
  PeriodStatus status = 4;
  bool is_billing_period = 5;
}

// Operator represents a field user that can log into the mobile app.
// The password_hash is synced so login can work offline.
message Operator {
  string id = 1;
  string email = 2;
  string password_hash = 3;
  string role = 4;
}
