syntax = "proto3";

package involt.v1;

import "involt/v1/models.proto";

option go_package = "github.com/infira/involt/backend/internal/gen/involt/v1;involtv1";

// AdminService handles administrative operations like user management and RBAC.
service AdminService {
  // Login authenticates a user and returns a JWT token.
  rpc Login(LoginRequest) returns (LoginResponse);
  
  // GetUsers returns a list of all administrative users.
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  
  // UpsertUser creates or updates an administrative user.
  rpc UpsertUser(UpsertUserRequest) returns (UpsertUserResponse);
  
  // GetSectors returns all available sectors for assignment.
  rpc GetSectors(GetSectorsRequest) returns (GetSectorsResponse);

  // GetCommunities returns all available communities.
  rpc GetCommunities(GetCommunitiesRequest) returns (GetCommunitiesResponse);

  // GetCustomers returns a list of all customers.
  rpc GetCustomers(GetCustomersRequest) returns (GetCustomersResponse);

  // GetReadings returns a list of readings, optionally filtered.
  rpc GetReadings(GetReadingsRequest) returns (GetReadingsResponse);

  // GetSettings returns the current system settings.
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);

  // UpdateSettings updates the system settings.
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);

  // UpsertCustomer creates or updates a customer.
  rpc UpsertCustomer(UpsertCustomerRequest) returns (UpsertCustomerResponse);

  // DeleteCustomer removes a customer record.
  rpc DeleteCustomer(DeleteCustomerRequest) returns (DeleteCustomerResponse);

  // GetDashboardStats returns summary statistics for the dashboard.
  rpc GetDashboardStats(GetDashboardStatsRequest) returns (GetDashboardStatsResponse);

  // ListPeriods returns all billing periods.
  rpc ListPeriods(ListPeriodsRequest) returns (ListPeriodsResponse);

  // GetPeriodStats returns detailed statistics for a specific period.
  rpc GetPeriodStats(GetPeriodStatsRequest) returns (GetPeriodStatsResponse);

  // OpenPeriod opens a new billing period.
  rpc OpenPeriod(OpenPeriodRequest) returns (OpenPeriodResponse);

  // ClosePeriod closes a billing period and optionally opens the next one.
  rpc ClosePeriod(ClosePeriodRequest) returns (ClosePeriodResponse);

  // UpsertSector creates or updates a sector.
  rpc UpsertSector(UpsertSectorRequest) returns (UpsertSectorResponse);

  // UpsertCommunity creates or updates a community.
  rpc UpsertCommunity(UpsertCommunityRequest) returns (UpsertCommunityResponse);

  // TogglePaymentStatus updates the payment status of a reading.
  rpc TogglePaymentStatus(TogglePaymentStatusRequest) returns (TogglePaymentStatusResponse);

  // GetCollections returns the payment matrix for a sector across periods.
  rpc GetCollections(GetCollectionsRequest) returns (GetCollectionsResponse);
}

message UpsertSectorRequest {
  Sector sector = 1;
}

message UpsertSectorResponse {
  Sector sector = 1;
}

message UpsertCommunityRequest {
  Community community = 1;
}

message UpsertCommunityResponse {
  Community community = 1;
}

message DeleteCustomerRequest {
  string id = 1;
}

message DeleteCustomerResponse {
  bool success = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message GetUsersRequest {}

message GetUsersResponse {
  repeated User users = 1;
}

message UpsertUserRequest {
  User user = 1;
  string password = 2;
}

message UpsertUserResponse {
  User user = 1;
}

message GetSectorsRequest {}

message GetSectorsResponse {
  repeated Sector sectors = 1;
}

message GetCommunitiesRequest {}

message GetCommunitiesResponse {
  repeated Community communities = 1;
}

message GetCustomersRequest {
  string sector_id = 1;
  string search_query = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  string exclude_period_id = 5;
  string community_id = 6;
}

message GetCustomersResponse {
  repeated Customer customers = 1;
  int32 total_count = 2;
}

message GetReadingsRequest {
  string customer_id = 1;
  string sector_id = 2;
  string period = 3;
  int32 page_number = 4;
  int32 page_size = 5;
}

message GetReadingsResponse {
  repeated Reading readings = 1;
  int32 total_count = 2;
}

message GetSettingsRequest {}

message GetSettingsResponse {
  Settings settings = 1;
}

message UpdateSettingsRequest {
  Settings settings = 1;
}

message UpdateSettingsResponse {
  Settings settings = 1;
}

message UpsertCustomerRequest {
  Customer customer = 1;
}

message UpsertCustomerResponse {
  Customer customer = 1;
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
  USER_ROLE_SUPERVISOR = 2;
  USER_ROLE_READER = 3;
}

message User {
  string id = 1;
  string email = 2;
  UserRole role = 3;
  repeated string assigned_sector_ids = 4;
}

message GetDashboardStatsRequest {
  string period = 1;
}

message GetDashboardStatsResponse {
  int32 total_customers = 1;
  int32 total_users = 2;
  int32 total_readings_period = 3;
  int32 pending_readings_period = 4;
  double total_revenue = 5;
  double total_consumption_kwh = 6;
  double previous_consumption_kwh = 7;
  repeated SectorStat sector_stats = 8;
}

message SectorStat {
  string sector_id = 1;
  string sector_name = 2;
  int32 registered_count = 3;
  int32 total_count = 4;
  int32 progress_percentage = 5;
  double total_consumption = 6;
}

message ListPeriodsRequest {}

message ListPeriodsResponse {
  repeated Period periods = 1;
}

message GetPeriodStatsRequest {
  string period_id = 1;
}

message GetPeriodStatsResponse {
  int32 total_customers = 1;
  int32 readings_captured = 2;
  int32 missing_readings = 3;
  repeated MissingCustomer missing_customers = 4;
}

message MissingCustomer {
  string id = 1;
  string name = 2;
  string code = 3;
  string sector_name = 4;
  string supervisor = 5;
}

message OpenPeriodRequest {
  string id = 1; // YYYY-MM
  string start_date = 2;
  string end_date = 3;
}

message OpenPeriodResponse {
  Period period = 1;
}

message ClosePeriodRequest {
  string id = 1;
  bool open_next = 2;
}

message ClosePeriodResponse {
  Period closed_period = 1;
  Period next_period = 2;
}

message TogglePaymentStatusRequest {
  string reading_id = 1; // Reading ID
  bool is_paid = 2; // New status
}

message TogglePaymentStatusResponse {
  string reading_id = 1;
  bool is_paid = 2;
}

message GetCollectionsRequest {
  string sector_id = 1;
  repeated string periods = 2;
}

message GetCollectionsResponse {
  repeated Reading readings = 1;
}
