services:
  db:
    image: postgres:16-alpine
    container_name: involt_db
    restart: always
    environment:
      POSTGRES_USER: involt_user
      POSTGRES_PASSWORD: involt_password
      POSTGRES_DB: involt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U involt_user -d involt_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - involt-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: involt_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://involt_user:involt_password@db:5432/involt_db?sslmode=disable
    ports:
      - "8081:8080"
    networks:
      - involt-net

  admin:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: involt_admin
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3034:3000"
    networks:
      - involt-net

volumes:
  postgres_data:

networks:
  involt-net:
    driver: bridge