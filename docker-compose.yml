services:
  db:
    image: postgres:16-alpine
    container_name: involt_db
    restart: always
    environment:
      POSTGRES_USER: involt_user
      POSTGRES_PASSWORD: involt_password
      POSTGRES_DB: involt_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U involt_user -d involt_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: involt_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://involt_user:involt_password@db:5432/involt_db?sslmode=disable
    ports:
      - "8080:8080"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: involt_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://involt_user:involt_password@db:5432/involt_db?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres_data:
